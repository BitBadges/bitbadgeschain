name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v29)'
        required: true

permissions:
  contents: write

env:
  GO_VERSION: '1.24.5'

jobs:
  # `test` runs in parallel and is intentionally NON-BLOCKING: no build or
  # release job uses `needs: test`, so a failing test will not block a release.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -tags=test ./... -count=1

  build-linux-windows:
    name: Build Linux & Windows
    # Pinned to 22.04 (glibc 2.35) so release binaries run on Ubuntu 22.04+,
    # Debian 12+, RHEL 9+. ubuntu-latest (24.04, glibc 2.39) breaks older hosts.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compile toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all Linux + Windows binaries
        run: make build-all-cross VERSION=${{ steps.version.outputs.tag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-windows
          path: |
            build/bitbadgeschain-linux-amd64
            build/bitbadgeschain-linux-arm64
            build/bitbadgeschain-windows-amd64.exe
            build/bitbadgeschain-testnet-linux-amd64
            build/bitbadgeschain-testnet-linux-arm64
            build/bitbadgeschain-testnet-windows-amd64.exe

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all darwin binaries
        run: |
          make build-mainnet-darwin/amd64 VERSION=${{ steps.version.outputs.tag }}
          make build-mainnet-darwin/arm64 VERSION=${{ steps.version.outputs.tag }}
          make build-testnet-darwin/amd64 VERSION=${{ steps.version.outputs.tag }}
          make build-testnet-darwin/arm64 VERSION=${{ steps.version.outputs.tag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-darwin
          path: |
            build/bitbadgeschain-darwin-amd64
            build/bitbadgeschain-darwin-arm64
            build/bitbadgeschain-testnet-darwin-amd64
            build/bitbadgeschain-testnet-darwin-arm64

  release:
    name: Create Release
    needs: [build-linux-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux & Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-windows
          path: build/

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-darwin
          path: build/

      - name: Generate checksums
        run: |
          cd build
          sha256sum \
            bitbadgeschain-linux-amd64 \
            bitbadgeschain-linux-arm64 \
            bitbadgeschain-darwin-amd64 \
            bitbadgeschain-darwin-arm64 \
            bitbadgeschain-windows-amd64.exe \
            bitbadgeschain-testnet-linux-amd64 \
            bitbadgeschain-testnet-linux-arm64 \
            bitbadgeschain-testnet-darwin-amd64 \
            bitbadgeschain-testnet-darwin-arm64 \
            bitbadgeschain-testnet-windows-amd64.exe \
            > checksums.txt

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: true
          files: |
            build/bitbadgeschain-linux-amd64
            build/bitbadgeschain-linux-arm64
            build/bitbadgeschain-darwin-amd64
            build/bitbadgeschain-darwin-arm64
            build/bitbadgeschain-windows-amd64.exe
            build/bitbadgeschain-testnet-linux-amd64
            build/bitbadgeschain-testnet-linux-arm64
            build/bitbadgeschain-testnet-darwin-amd64
            build/bitbadgeschain-testnet-darwin-arm64
            build/bitbadgeschain-testnet-windows-amd64.exe
            build/checksums.txt
          body: |
            ## Install

            **One-liner:**
            ```bash
            curl -fsSL https://install.bitbadges.io | sh
            ```

            **Testnet:**
            ```bash
            curl -fsSL https://install.bitbadges.io | sh -s -- --testnet
            ```

            **SDK CLI:**
            ```bash
            npm install -g bitbadges
            ```

            ## Binaries

            | Platform | Mainnet | Testnet |
            |----------|---------|---------|
            | Linux x86_64 | `bitbadgeschain-linux-amd64` | `bitbadgeschain-testnet-linux-amd64` |
            | Linux ARM64 | `bitbadgeschain-linux-arm64` | `bitbadgeschain-testnet-linux-arm64` |
            | macOS Intel | `bitbadgeschain-darwin-amd64` | `bitbadgeschain-testnet-darwin-amd64` |
            | macOS Apple Silicon | `bitbadgeschain-darwin-arm64` | `bitbadgeschain-testnet-darwin-arm64` |
            | Windows x86_64 | `bitbadgeschain-windows-amd64.exe` | `bitbadgeschain-testnet-windows-amd64.exe` |

            ## Verify

            ```bash
            sha256sum -c checksums.txt
            ```
