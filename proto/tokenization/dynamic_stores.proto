syntax = "proto3";
package tokenization;

import "gogoproto/gogo.proto";

option go_package = "github.com/bitbadges/bitbadgeschain/x/tokenization/types";

/*
  A DynamicStore is a flexible storage object that can store arbitrary data.
  It is identified by a unique ID assigned by the blockchain, which is a uint64 that increments.
  Dynamic stores are created by users and can only be updated or deleted by their creator.
  They provide a way to store custom data on-chain with proper access control.
*/
message DynamicStore {
  // The unique identifier for this dynamic store. This is assigned by the blockchain.
  string storeId = 1 [(gogoproto.customtype) = "Uint", (gogoproto.nullable) = false];
  // The address of the creator of this dynamic store.
  string createdBy = 2;
  // The default numeric value for uninitialized addresses (Uint as string, e.g. "0", "1", "100").
  // For backward compatibility: "0" = old false, "1" = old true.
  string defaultValue = 3 [(gogoproto.customtype) = "Uint", (gogoproto.nullable) = false];
  // Global kill switch state (defaults to true on creation, can be toggled via UpdateDynamicStore).
  // When false, all approvals using this store via DynamicStoreChallenge will fail immediately.
  bool globalEnabled = 4;
  // URI for additional metadata or resources associated with this dynamic store.
  string uri = 5;
  // Custom data field for storing arbitrary data associated with this dynamic store.
  string customData = 6;
}

/*
  A DynamicStoreValue stores a numeric value (Uint) for a specific address in a dynamic store.
  This allows the creator to set numeric values per address that can be checked during approval.
  For backward compatibility: 0 = old false, any non-zero = old true.
*/
message DynamicStoreValue {
  // The unique identifier for this dynamic store.
  string storeId = 1 [(gogoproto.customtype) = "Uint", (gogoproto.nullable) = false];
  // The address for which this value is stored.
  string address = 2;
  // The numeric value (Uint as string, e.g. "0", "1", "100").
  string value = 3 [(gogoproto.customtype) = "Uint", (gogoproto.nullable) = false];
} 